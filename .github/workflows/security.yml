name: Security

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  policy-guards:
    name: Security Policy Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web
      - name: Run P0 security policy tests
        run: npm run test:run -- src/__tests__/security/p0-hardening.test.ts
        working-directory: apps/web

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' && github.event.repository.dependency_graph_enabled == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Dependency review
        uses: actions/dependency-review-action@v4
